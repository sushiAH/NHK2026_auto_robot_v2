amcl:
  ros__parameters:
    use_sim_time: False
    robot_model_type: "nav2_amcl::OmnidirectionalMotionModel"
    base_frame_id: "base_link"
    global_frame_id: "map"
    odom_frame_id: "odom"
    # パーティクルは最小限（負荷を徹底的に下げる）
    max_particles: 400
    min_particles: 100
    update_min_d: 0.1
    update_min_a: 0.1
    scan_topic: "scan_filtered"
    tf_broadcast: true

map_server:
  ros__parameters:
    use_sim_time: False
    yaml_filename: "map_01.yaml"

controller_server:
  ros__parameters:
    use_sim_time: False
    controller_frequency: 20.0
    # コストマップを使わないための重要設定
    use_collision_detection: False 
    controller_plugins: ["FollowPath"]

    FollowPath:
      plugin: "nav2_regulated_pure_pursuit_controller::RegulatedPurePursuitController"
      desired_linear_velocity: 0.15
      max_velocity: 0.2
      min_velocity: 0.0
      max_angular_velocity: 1.0
      # Pure Pursuit パラメータ
      lookahead_dist: 0.4
      min_lookahead_dist: 0.3
      max_lookahead_dist: 0.6
      lookahead_time: 1.5
      use_velocity_scaled_lookahead_dist: True
      # 障害物回避を行わない設定
      use_approach_vel_scaling: False # 障害物接近時の減速をオフ
      use_collision_detection: False  # 衝突検知を完全にオフ
