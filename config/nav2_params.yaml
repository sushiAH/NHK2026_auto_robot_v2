amcl:
  ros__parameters:
    use_sim_time: false

    # --- フレーム設定 ---
    base_frame_id: "base_link"
    global_frame_id: "map"
    odom_frame_id: "odom"
    tf_broadcast: true

    # --- 初期姿勢 ---
    set_initial_pose: true
    initial_pose:
      x: 0.0826
      y: 0.04423
      z: 0.0
      yaw: 0.0

    # --- モーションモデル（全方位） ---
    robot_model_type: "nav2_amcl::OmniMotionModel"
    alpha1: 0.1
    alpha2: 0.1
    alpha3: 0.1
    alpha4: 0.1
    alpha5: 0.1

    # --- パーティクル数（低負荷設定） ---
    min_particles: 500
    max_particles: 3000

    # --- 更新トリガー ---
    update_min_d: 0.1
    update_min_a: 0.1

    # --- レーザースキャン ---
    scan_topic: "scan_filtered"
    laser_model_type: "likelihood_field"
    laser_max_range: 20.0
    laser_min_range: 0.1
    max_beams: 60

    # --- 尤度場モデル ---
    laser_likelihood_max_dist: 2.0
    sigma_hit: 0.2
    z_hit: 0.9
    z_rand: 0.1

map_server:
  ros__parameters:
    use_sim_time: false
    yaml_filename: "map_01.yaml"
